<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memori Kita - Firebase</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #eef2f7; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 450px; 
            text-align: center; 
        }
        .hidden { display: none !important; }
        input[type="text"], input[type="password"], input[type="file"] { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
        }
        button { 
            background: #ff4757; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold; 
            transition: 0.3s; 
            margin-top: 10px;
        }
        button:hover { background: #e84118; }
        button:disabled { 
            background: #ccc; 
            cursor: not-allowed; 
        }
        .error-msg { 
            color: #eb4d4b; 
            font-size: 13px; 
            font-weight: bold; 
            margin-bottom: 10px; 
            height: 15px; 
        }
        .success-msg { 
            color: #26de81; 
            font-size: 13px; 
            font-weight: bold; 
            margin-bottom: 10px; 
        }
        h1 { color: #ff4757; margin-bottom: 20px; }

        /* Gallery */
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
            gap: 15px; 
            margin-top: 20px; 
            max-height: 400px; 
            overflow-y: auto; 
            padding: 10px; 
        }
        .img-card { 
            position: relative; 
            border-radius: 10px; 
            overflow: hidden; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            transition: transform 0.2s; 
            cursor: pointer; 
            height: 120px; 
        }
        .img-card:hover { transform: scale(1.05); }
        .img-card img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        .loading-text {
            color: #666;
            font-size: 14px;
            padding: 20px;
        }

        /* Preview */
        #preview-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.95); 
            z-index: 1000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }
        #preview-img { 
            max-width: 90%; 
            max-height: 75%; 
            border-radius: 8px; 
        }
        .controls { 
            margin-top: 20px; 
            display: flex; 
            gap: 15px; 
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-icon { 
            background: white; 
            color: #333; 
            padding: 10px 18px; 
            border-radius: 20px; 
            cursor: pointer; 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: bold; 
            border: none;
            transition: 0.3s;
        }
        .btn-icon:hover { 
            background: #f0f0f0;
        }
        .btn-delete { 
            background: #ff4757; 
            color: white; 
        }
        .btn-delete:hover { 
            background: #e84118;
        }
